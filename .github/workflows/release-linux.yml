name: Build Linux (DEB + RPM)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            patchelf \
            rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri bundles (deb, rpm)
        run: npm run tauri build -- --bundles deb,rpm

      - name: Collect artifacts
        run: |
          mkdir -p dist-linux
          find src-tauri/target/release/bundle/deb -name '*.deb' -exec cp {} dist-linux/ \;
          find src-tauri/target/release/bundle/rpm -name '*.rpm' -exec cp {} dist-linux/ \;
          ls -la dist-linux/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termpane-linux-${{ matrix.arch }}
          path: dist-linux/*
          if-no-files-found: error

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-linux/*
          draft: true
          generate_release_notes: true
